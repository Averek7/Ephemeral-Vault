[package]
name = "backend"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1.36", features = ["full"] }
actix-web = { version = "4.5", features = ["rustls-0_23"] }
actix-rt = "2.9"
solana-client = "1.18"
solana-sdk = "1.18"
sqlx = { version = "0.7", features = [
    "runtime-tokio-rustls",
    "postgres",
    "uuid",
    "chrono",
    "json",
    "macros",
    "migrate",
] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.7", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tokio-cron-scheduler = "0.10"
aes-gcm = "0.10"
rand = "0.8"
dotenv = "0.15"
log = "0.4"
env_logger = "0.11"
anyhow = "1.0"
thiserror = "1.0"

[dev-dependencies]
mockito = "1.4"
serial_test = "3.0"
pretty_assertions = "1.4"
